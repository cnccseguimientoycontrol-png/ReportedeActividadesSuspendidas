<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTE DE ACTIVIDADES SUSPENDIDAS</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #2c3e50;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #34495e;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        textarea { resize: vertical; min-height: 80px; }
        .radio-group {
            display: block;
            margin-top: 5px;
        }
        .radio-option {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .radio-option input { margin-right: 8px; }
        button {
            width: 100%;
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #1a252f; }
    </style>
</head>
<body>

<div class="form-container">
   
<div style="width: 100%; text-align:center;margin-bottom:20px;">
    <img src="CNCC B.jpg" alt="Banner Institucional" style="width: 100%; max-width: 100%; height: auto; border-radius; 8px; display: block; margin: 0 auto;">
</div>

    <div id="mensajeExito" style="display: none; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 500px; margin: 20px auto;">
    <h1 style="color: #1a252f; font-size: 24px; margin-bottom: 10px;">¡REPORTE ENVIADO CON ÉXITO!</h1>
    <p style="color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 25px;">La información ha sido enviada correctamente en breve confirmaremos la veracidad de la misma.</p>
    <button onclick="window.location.reload();" style="padding: 12px 25px; background-color: #1a252f; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">ENVIAR OTRO REPORTE</button>
</div>
    
    <form id=miFormulario style="display: flex; flex-direction: column; gap: 15px;">

        <div class="form-group">
            <label for="area">ÁREA RESPONSABLE DE LA ACTIVIDAD:</label>
            <select id="area" name="area" required>
                <option value="" disabled selected>Seleccione el área...</option>
                <option value="SUPERINTENDENCIA NACIONAL CONTRA LA CORRUPCIÓN">SUPERINTENDENCIA NACIONAL CONTRA LA CORRUPCIÓN</option>
                <option value="INTENDENCIA NACIONAL ANTICORRUCIÓN">INTENDENCIA NACIONAL ANTICORRUCIÓN</option>
                <option value="DIRECCIÓN DE GESTIÓN HUMANA">DIRECCIÓN DE GESTIÓN HUMANA</option>
                <option value="ATENCIÓN CIUDADANA">ATENCIÓN CIUDADANA</option>
                <option value="DIRECCIÓN DE FORMACIÓN ACADÉMICA">DIRECCIÓN DE FORMACIÓN ACADÉMICA</option>
            </select>
        </div>
 
        <div class="form-group">
            <label for="actividad">NOMBRE DE LA ACTIVIDAD:</label>
            <input type="text" id="actividad" name="actividad" required placeholder="Ej. Curso de Redacción" style="text-transform: uppercase;" oninput="this.value = this.value.toUppercase()">
        </div>

        <div class="form-group">
            <label for="fecha">FECHA EN LA QUE HABIA SIDO PLANIFICADA:</label>
            <input type="date" id="fecha" name="fecha" required>
        </div>

        <div class="form-group">
            <label for="motivo">MOTIVO DE LA SUSPENSIÓN:</label>
            <textarea id="motivo" name="motivo" required placeholder="ESCRIBA CON DETALLE LAS RAZONES DE LA SUSPENSIÓN..." style="text-transform: uppercase;" oninput="this.value = this.value.toUppercase()"></textarea>
        </div>

        <div class="form-group">
            <label>¿ESTATUS ACTUAL DE LA ACTIVIDAD?</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="estatus" value="REPROGRAMADA" required> REPROGRAMADA
                </label>
                <label class="radio-option">
                    <input type="radio" name="estatus" value="SUSPENDIDA DEFINITIVAMENTE"> SUSPENDIDA DEFENITIVAMENTE
                </label>
            </div>
        </div>

        <button type="submit">ENVIAR REPORTE POR CORREO ELECTRÓNICO</button>
    </form>
</div>

<script>
function prepararCorreo(event) {
    event.preventDefault(); 
    
    var actividad = document.getElementById('actividad').value;
    var fecha = document.getElementById('fecha').value;
    var area = document.getElementById('area').value;
    var motivo = document.getElementById('motivo').value;
    var estatus = document.querySelector('input[name="estatus"]:checked').value;
    
    var form = event.target;
    var action = form.getAttribute('action');
    
    var asunto = encodeURIComponent("REPORTE: Actividad Suspendida - " + area);
    
    var cuerpo = "REPORTE DE ACTIVIDAD SUSPENDIDA\n";
    cuerpo += "===================================\n\n";
    cuerpo += "• Nombre de la actividad: " + actividad + "\n";
    cuerpo += "• Fecha planificada: " + fecha + "\n";
    cuerpo += "• Área responsable: " + area + "\n";
    cuerpo += "• Motivo de suspensión: " + motivo + "\n";
    cuerpo += "• Estado de la actividad: " + estatus + "\n\n";
    cuerpo += "===================================";
    
    cuerpo = encodeURIComponent(cuerpo);
    
    window.location.href = action + "?subject=" + asunto + "&body=" + cuerpo;
}
</script>

    <script>
    document.getElementById("miFormulario").addEventListener("submit", function(e) {
        e.preventDefault(); // Evita que la página viaje a la pantalla gris de Formspree
        
        var form = this;
        var data = new FormData(form);
        var button = form.querySelector('button[type="submit"]');
        
        button.disabled = true;
        button.innerText = "ENVIANDO REPORTE...";

        fetch("https://formspree.io/f/xzdqoyqv", {
            method: "POST",
            body: data,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (response.ok) {
                form.style.display = "none"; // Esconde el formulario
                document.getElementById("mensajeExito").style.display = "block"; // Muestra el cartel de éxito
            } else {
                alert("Hubo un error al enviar el reporte. Por favor, intente de nuevo.");
                button.disabled = false;
                button.innerText = "ENVIAR REPORTE POR CORREO ELECTRONICO";
            }
        }).catch(error => {
            alert("Error de conexión. Intente nuevamente.");
            button.disabled = false;
            button.innerText = "ENVIAR REPORTE POR CORREO ELECTRONICO";
        });
    });
</script>

</body>
</html>
