<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTE DE ACTIVIDADES SUSPENDIDAS</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #2c3e50;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #34495e;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        textarea { resize: vertical; min-height: 80px; }
        .radio-group {
            display: block;
            margin-top: 5px;
        }
        .radio-option {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .radio-option input { margin-right: 8px; }
        button {
            width: 100%;
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #1a252f; }
    </style>
</head>
<body>

<div class="form-container">
   
<div style="width: 100%; text-aling:center;margin-bottom:20px;">
    <img src="CNCC B.jpg" alt="Banner Institucional" style="width: 100%; max-width: 100%; heigth: auto; border-radius; 8px; display: block; margin: 0 auto;">
</div>
    <form action="https://formspree.io/f/xzdqoyqv" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
       
        <div class="form-group">
            <label for="area">ÁREA RESPONSABLE DE LA ACTIVIDAD:</label>
            <select id="area" name="area" required>
                <option value="" disabled selected>Seleccione el área...</option>
                <option value="SUPERINTENDENCIA NACIONAL CONTRA LA CORRUPCIÓN">SUPERINTENDENCIA NACIONAL CONTRA LA CORRUPCIÓN</option>
                <option value="INTENDENCIA NACIONAL ANTICORRUCIÓN">INTENDENCIA NACIONAL ANTICORRUCIÓN</option>
                <option value="DIRECCIÓN DE GESTIÓN HUMANA">DIRECCIÓN DE GESTIÓN HUMANA</option>
                <option value="ATENCIÓN CIUDADANA">ATENCIÓN CIUDADANA</option>
                <option value="DIRECCIÓN DE FORMACIÓN ACADÉMICA">DIRECCIÓN DE FORMACIÓN ACADÉMICA</option>
            </select>
        </div>
 
        <div class="form-group">
            <label for="actividad">NOMBRE DE LA ACTIVIDAD:</label>
            <input type="text" id="actividad" name="actividad" required placeholder="Ej. Curso de Redacción" style="text-transform: uppercase;" oninput="this.value = this.value.toUppercase()">
        </div>

        <div class="form-group">
            <label for="fecha">FECHA PLANIFICADA LA ACTIVIDAD:</label>
            <input type="date" id="fecha" name="fecha" required>
        </div>

        <div class="form-group">
            <label for="motivo">MOTIVO DE LA SUSPENSIÓN:</label>
            <textarea id="motivo" name="motivo" required placeholder="Escriba detalladamente las razones..." style="text-transform: uppercase;" oninput="this.value = this.value.toUppercase()"></textarea>
        </div>

        <div class="form-group">
            <label>¿ESTATUS ACTUAL DE LA ACTIVIDAD?</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="estatus" value="REPROGRAMADA" required> REPROGRAMADA
                </label>
                <label class="radio-option">
                    <input type="radio" name="estatus" value="SUSPENDIDA DEFINITIVAMENTE"> SUSPENDIDA DEFENITIVAMENTE
                </label>
            </div>
        </div>

        <button type="submit">ENVIAR REPORTE POR CORREO ELECTRONICO</button>
    </form>
</div>

<script>
function prepararCorreo(event) {
    event.preventDefault(); 
    
    var actividad = document.getElementById('actividad').value;
    var fecha = document.getElementById('fecha').value;
    var area = document.getElementById('area').value;
    var motivo = document.getElementById('motivo').value;
    var estatus = document.querySelector('input[name="estatus"]:checked').value;
    
    var form = event.target;
    var action = form.getAttribute('action');
    
    var asunto = encodeURIComponent("REPORTE: Actividad Suspendida - " + area);
    
    var cuerpo = "REPORTE DE ACTIVIDAD SUSPENDIDA\n";
    cuerpo += "===================================\n\n";
    cuerpo += "• Nombre de la actividad: " + actividad + "\n";
    cuerpo += "• Fecha planificada: " + fecha + "\n";
    cuerpo += "• Área responsable: " + area + "\n";
    cuerpo += "• Motivo de suspensión: " + motivo + "\n";
    cuerpo += "• Estado de la actividad: " + estatus + "\n\n";
    cuerpo += "===================================";
    
    cuerpo = encodeURIComponent(cuerpo);
    
    window.location.href = action + "?subject=" + asunto + "&body=" + cuerpo;
}
</script>

</body>
</html>
